<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>滴滴出行 · 专属优惠券</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FF6B00;
    --orange-light: #FF8C38;
    --orange-glow: rgba(255,107,0,0.25);
    --dark: #0D0D0D;
    --card-bg: #161616;
    --surface: #1E1E1E;
    --border: rgba(255,255,255,0.06);
    --text: #F5F5F5;
    --muted: #888;
    --success: #00C853;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Hero */
  .hero {
    position: relative;
    padding: 48px 20px 32px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 320px; height: 320px;
    background: radial-gradient(circle, var(--orange-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--orange);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
  .hero-title {
    font-size: 28px; font-weight: 900;
    line-height: 1.2; margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .hero-title span { color: var(--orange); }
  .hero-sub { font-size: 13px; color: var(--muted); font-weight: 300; }

  /* Location Bar */
  .location-bar {
    margin: 0 16px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.2s;
  }
  .location-bar.locating { border-color: var(--orange); }
  .loc-icon {
    width: 36px; height: 36px; flex-shrink: 0;
    background: var(--orange-glow);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .loc-info { flex: 1; overflow: hidden; }
  .loc-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
  .loc-city {
    font-size: 16px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .loc-city.loading { color: var(--muted); animation: pulse 1.2s ease infinite; }
  .loc-btn {
    font-size: 12px; color: var(--orange); font-weight: 500;
    background: none; border: none; cursor: pointer;
    padding: 6px 0; white-space: nowrap;
  }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* City Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { opacity: 1; pointer-events: all; }
  .modal-sheet {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  }
  .modal-overlay.active .modal-sheet { transform: translateY(0); }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .city-search {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px; font-family: inherit;
    outline: none; margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .city-search:focus { border-color: var(--orange); }
  .city-search::placeholder { color: var(--muted); }
  .city-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-height: 280px; overflow-y: auto; }
  .city-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 4px;
    text-align: center; font-size: 13px;
    cursor: pointer; transition: all 0.15s;
    font-family: inherit; color: var(--text);
  }
  .city-item:active, .city-item.selected { background: var(--orange); border-color: var(--orange); color: white; font-weight: 700; }
  .city-item.no-coupon { opacity: 0.35; cursor: default; }

  /* Section */
  .section { padding: 0 16px; margin-bottom: 24px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
  .section-title .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); animation: blink 2s ease infinite; }
  @keyframes blink { 0%,100%{opacity:1}50%{opacity:0.3} }

  /* Coupon Card */
  .coupon-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px; margin-bottom: 12px;
    position: relative; overflow: hidden;
    animation: slideUp 0.4s ease both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }
  .coupon-card::before {
    content: '';
    position: absolute; top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, var(--orange-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .coupon-card.claimed { opacity: 0.6; }
  .coupon-top { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
  .coupon-amount {
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border-radius: 14px; padding: 12px 14px;
    text-align: center; min-width: 72px;
  }
  .amount-num { font-size: 28px; font-weight: 900; line-height: 1; color: white; }
  .amount-unit { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .coupon-info { flex: 1; }
  .coupon-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .coupon-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .coupon-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; border-top: 1px dashed var(--border);
  }
  .coupon-expire { font-size: 11px; color: var(--muted); }
  .claim-btn {
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    color: white; border: none; border-radius: 24px;
    padding: 10px 20px; font-size: 13px; font-weight: 700;
    font-family: inherit; cursor: pointer;
    position: relative; overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px var(--orange-glow);
  }
  .claim-btn:active { transform: scale(0.95); }
  .claim-btn.claimed { background: var(--surface); color: var(--muted); box-shadow: none; cursor: default; }
  .claim-btn .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(255,255,255,0.4);
    transform: scale(0); animation: ripple 0.5s linear; pointer-events: none;
  }
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }

  /* Empty & Error */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 14px; line-height: 1.6; }

  /* Skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--card-bg) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 20px;
  }
  @keyframes shimmer { 0%{background-position:200% 0}100%{background-position:-200% 0} }
  .skeleton-card { height: 140px; margin-bottom: 12px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #222; border: 1px solid var(--border);
    border-radius: 24px; padding: 12px 20px;
    font-size: 13px; white-space: nowrap;
    opacity: 0; transition: all 0.3s; z-index: 200; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: #ff4444; color: #ff4444; }

  .claimed-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; color: var(--success);
    background: rgba(0,200,83,0.1); border-radius: 20px; padding: 6px 14px;
  }
</style>
</head>
<body>

<div class="hero">
  <div class="logo">
    <div class="logo-icon">🚖</div>
    <span class="logo-text">滴滴专属福利</span>
  </div>
  <div class="hero-title">领取<span>专属</span>出行券</div>
  <div class="hero-sub">限量发放 · 先到先得 · 不可错过</div>
</div>

<div class="location-bar locating" id="locationBar">
  <div class="loc-icon">📍</div>
  <div class="loc-info">
    <div class="loc-label">当前城市</div>
    <div class="loc-city loading" id="cityName">定位中...</div>
  </div>
  <button class="loc-btn" onclick="openCityModal()">切换城市 ›</button>
</div>

<div class="section">
  <div class="section-header">
    <div class="section-title"><span class="dot"></span>可领取优惠券</div>
    <span id="couponCount" style="font-size:12px;color:var(--muted)"></span>
  </div>
  <div id="couponList">
    <div class="skeleton skeleton-card"></div>
    <div class="skeleton skeleton-card" style="animation-delay:0.1s"></div>
  </div>
</div>

<!-- City Modal -->
<div class="modal-overlay" id="cityModal" onclick="handleOverlayClick(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">选择城市</div>
    <input class="city-search" placeholder="搜索城市名称..." id="citySearch" oninput="filterCities(this.value)">
    <div class="city-grid" id="cityGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── 数据加载 ─────────────────────────────────────────────
let allCoupons = [];   // 从 data.json 加载的原始数组
let allCities = [];    // 有数据的城市列表
let currentCity = null;
let claimedSet = new Set(JSON.parse(localStorage.getItem('didi_claimed') || '[]'));

async function loadData() {
  try {
    // 加载 data.json（与本页同目录）
    const res = await fetch('./data.json?t=' + Date.now()); // 加时间戳防缓存
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allCoupons = await res.json();
    allCities = [...new Set(allCoupons.map(c => c.city))].sort();
    initLocation();
  } catch (e) {
    console.warn('data.json 加载失败，使用内置示例数据', e);
    // 如果 data.json 不存在（本地直接打开时），使用示例数据
    allCoupons = [
      { id:'demo1', city:'北京', name:'打车立减券', amount:20, unit:'元', desc:'满50元可用\n快车/专车通用', total:500, remain:127, expire:'2025-12-31', link:'https://www.didiglobal.com' },
      { id:'demo2', city:'上海', name:'新人专享券', amount:30, unit:'元', desc:'满60元可用\n限新用户', total:300, remain:89, expire:'2025-12-31', link:'https://www.didiglobal.com' },
    ];
    allCities = [...new Set(allCoupons.map(c => c.city))];
    initLocation();
    showToast('演示模式：请上传 data.json 后刷新', '');
  }
}

// ─── 定位 ─────────────────────────────────────────────────
function initLocation() {
  if (!navigator.geolocation) { setCity(allCities[0] || '北京'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const city = detectCityByCoord(pos.coords.latitude, pos.coords.longitude);
      // 如果定位到的城市在数据中存在就用它，否则用第一个有数据的城市
      setCity(allCities.includes(city) ? city : (allCities[0] || city));
    },
    () => { setCity(allCities[0] || '北京'); showToast('定位失败，已显示默认城市', 'error'); },
    { timeout: 8000, maximumAge: 60000 }
  );
}

function detectCityByCoord(lat, lng) {
  if (lat>39&&lat<41&&lng>115&&lng<117.5) return '北京';
  if (lat>30&&lat<32&&lng>120&&lng<122) return '上海';
  if (lat>22.5&&lat<24&&lng>112&&lng<114) return '广州';
  if (lat>22&&lat<22.8&&lng>113.5&&lng<114.5) return '深圳';
  if (lat>29.5&&lat<30.5&&lng>119.5&&lng<121) return '杭州';
  if (lat>30&&lat<31&&lng>103.5&&lng<104.5) return '成都';
  if (lat>29.3&&lat<30.3&&lng>113.8&&lng<115) return '武汉';
  if (lat>29&&lat<30&&lng>106&&lng<107.5) return '重庆';
  if (lat>28.5&&lat<29.5&&lng>115.8&&lng<117) return '南昌';
  if (lat>36&&lat<37&&lng>116.8&&lng<118) return '济南';
  return '北京';
}

function setCity(city) {
  currentCity = city;
  const el = document.getElementById('cityName');
  el.textContent = city;
  el.classList.remove('loading');
  document.getElementById('locationBar').classList.remove('locating');
  renderCoupons(city);
}

// ─── 渲染优惠券 ───────────────────────────────────────────
function renderCoupons(city) {
  const list = document.getElementById('couponList');
  const coupons = allCoupons.filter(c => c.city === city);
  const countEl = document.getElementById('couponCount');

  if (coupons.length === 0) {
    countEl.textContent = '';
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎫</div>
      <div class="empty-text">${city}暂无可用优惠券<br>请关注后续活动</div>
    </div>`;
    return;
  }

  countEl.textContent = `共 ${coupons.length} 张可领`;
  list.innerHTML = coupons.map((c, i) => {
    const claimed = claimedSet.has(c.id);
    const urgentText = (c.remain > 0 && c.remain <= 50)
      ? `<span style="color:#FF4444;font-size:11px;margin-left:6px">仅剩 ${c.remain} 张</span>` : '';
    return `<div class="coupon-card ${claimed?'claimed':''}" style="animation-delay:${i*0.08}s">
      <div class="coupon-top">
        <div class="coupon-amount">
          <div class="amount-num">${c.amount}</div>
          <div class="amount-unit">${c.unit || '元'}券</div>
        </div>
        <div class="coupon-info">
          <div class="coupon-name">${c.name}</div>
          <div class="coupon-desc">${(c.desc||'').replace(/\n/g,'<br>')}</div>
        </div>
      </div>
      <div class="coupon-footer">
        <div class="coupon-expire">有效期至 ${c.expire}${urgentText}</div>
        ${claimed
          ? `<div class="claimed-badge">✓ 已领取</div>`
          : `<button class="claim-btn" onclick="claimCoupon('${c.id}','${c.link}',this)">立即领取</button>`}
      </div>
    </div>`;
  }).join('');
}

// ─── 领取 ─────────────────────────────────────────────────
function claimCoupon(id, link, btn) {
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.cssText = 'width:60px;height:60px;left:-10px;top:-10px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);

  btn.disabled = true; btn.textContent = '跳转中...';
  setTimeout(() => {
    claimedSet.add(id);
    localStorage.setItem('didi_claimed', JSON.stringify([...claimedSet]));
    window.location.href = link;
    setTimeout(() => renderCoupons(currentCity), 500);
    showToast('正在跳转领取页面...', 'success');
  }, 400);
}

// ─── 城市选择器 ───────────────────────────────────────────
function openCityModal() {
  document.getElementById('cityModal').classList.add('active');
  document.getElementById('citySearch').value = '';
  renderCityGrid(allCities);
  setTimeout(() => document.getElementById('citySearch').focus(), 300);
}
function closeCityModal() { document.getElementById('cityModal').classList.remove('active'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('cityModal')) closeCityModal(); }

function renderCityGrid(cities) {
  const hasCoupon = city => allCoupons.some(c => c.city === city);
  document.getElementById('cityGrid').innerHTML = cities.map(city => `
    <button class="city-item ${city===currentCity?'selected':''} ${!hasCoupon(city)?'no-coupon':''}"
      onclick="${hasCoupon(city)?`selectCity('${city}')`:''}">
      ${city}
    </button>`).join('');
}

function filterCities(q) {
  const filtered = allCities.filter(c => c.includes(q));
  renderCityGrid(filtered.length ? filtered : allCities);
}

function selectCity(city) {
  closeCityModal();
  document.getElementById('cityName').classList.add('loading');
  setTimeout(() => setCity(city), 300);
  showToast(`已切换到 ${city}`, '');
}

// ─── Toast ────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type||'');
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── 启动 ─────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
